<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=./public/index.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renewable Energy Monitor</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #eaf7ff;
        background:
          radial-gradient(circle at top, rgba(39, 211, 179, 0.18), transparent 28%),
          linear-gradient(180deg, #051019 0%, #0a1824 100%);
      }

      .card {
        width: min(92vw, 420px);
        padding: 28px;
        border-radius: 22px;
        border: 1px solid rgba(56, 189, 248, 0.2);
        background: rgba(8, 17, 26, 0.9);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.32);
        text-align: center;
      }

      a {
        color: #5eead4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Opening Renewable Energy Monitor...</h1>
      <p>If the dashboard does not open automatically, <a href="./public/index.html">click here</a>.</p>
    </div>
  </body>
</html>
